name: CI Pipeline

on:
    pull_request:
        branches: ["main"]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3
            - name: Using Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: 24.
            - name: Install dependencies
              run: npm install
            - name: Run lint
              run: npm run lint
            - name: Run tests
              run: npm test
            - name: Run Cypress tests
              run: npx cypress run
