on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build-test:
        runs-on: ubuntu-latest

        services:
            docker:
                image: docker:20.10-dind
                options: --privileged

        steps:
            # ----------------- Setup -----------------
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            # ----------------- Build containers -----------------
            - name: Build and start containers
              run: docker compose up -d --build

            # ----------------- Wait for services using dockerize -----------------
            - name: Wait for frontend and backend
              run: |
                  apk add --no-cache dockerize   # instala dockerize no container runner
                  dockerize -wait tcp://localhost:3000 -timeout 60s
                  dockerize -wait tcp://localhost:4000 -timeout 60s

            # ----------------- Rodar Cypress -----------------
            - name: Instalar dependências Cypress
              run: npm install cypress --save-dev

            - name: Rodar testes E2E
              run: npx cypress run --config baseUrl=http://localhost:3000

            # ----------------- Encerrar containers -----------------
            - name: Stop containers
              run: docker compose down
